services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: todo-app-backend
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/
    container_name: todo-app-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped
